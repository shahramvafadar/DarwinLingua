name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - work

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore non-MAUI projects
        shell: bash
        run: |
          mapfile -t projects < <(find src tests -name '*.csproj' ! -path '*/Apps/DarwinDeutsch.Maui/*' | sort)
          for project in "${projects[@]}"; do
            echo "Restoring $project"
            dotnet restore "$project"
          done

      - name: Build non-MAUI projects
        shell: bash
        run: |
          mapfile -t projects < <(find src tests -name '*.csproj' ! -path '*/Apps/DarwinDeutsch.Maui/*' | sort)
          for project in "${projects[@]}"; do
            echo "Building $project"
            dotnet build "$project" --configuration Release --no-restore
          done

      - name: Run tests
        shell: bash
        run: |
          mapfile -t test_projects < <(find tests -name '*.csproj' | sort)
          for project in "${test_projects[@]}"; do
            echo "Testing $project"
            dotnet test "$project" --configuration Release --no-build
          done
